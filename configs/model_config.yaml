# PD model training configuration

scoring:
  models:
    - catboost
    - lightgbm
    - xgboost
  ensemble: true
  calibration: isotonic
  min_auc_for_registration: 0.70
  optuna_trials: 15
  time_split:
    train_end: "2022-12-31"
    val_end: "2023-06-30"
  registered_model_name: credit_scoring
  model_alias: champion
