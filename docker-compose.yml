version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    MLFLOW_TRACKING_URI: http://mlflow:5000
    PYTHONPATH: /opt/airflow
    APP_DB_HOST: postgres
    APP_DB_PORT: 5432
    APP_DB_NAME: credit_scoring
    APP_DB_USER: ml_user
    APP_DB_PASSWORD: ml_password
    LENDING_CLUB_CSV_PATH: /opt/airflow/data/sample_applications.csv
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./configs:/opt/airflow/configs
    - ./tests:/opt/airflow/tests
    - ./scripts:/opt/airflow/scripts
    - ./logs/airflow:/opt/airflow/logs
    - ./artifacts:/opt/airflow/artifacts
    - ./data:/opt/airflow/data
  depends_on:
    postgres:
      condition: service_healthy
  # Optional: copy .env.example to .env
  # env_file: [.env]

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db init &&
      airflow users create
        --username admin
        --password admin
        --firstname Admin
        --lastname Admin
        --role Admin
        --email admin@admin.com || true
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
      - ./artifacts:/mlflow/local_artifacts
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      APP_DB_HOST: postgres
      APP_DB_PORT: 5432
      APP_DB_NAME: credit_scoring
      APP_DB_USER: ml_user
      APP_DB_PASSWORD: ml_password
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
      - ./artifacts:/app/artifacts
    depends_on:
      - mlflow
      - postgres
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  mlflow_artifacts:
  grafana_data:
